media:
  - name: images
    label: Afbeeldingen
    input: assets/uploads
    output: /assets/uploads
    rename: safe
    categories: [image]
    extensions: [jpg, jpeg, png, webp, avif, svg]

settings:
  content:
    merge: true
  commit:
    templates:
      create: "Content toegevoegd: {filename}"
      update: "Content aangepast: {filename}"
      delete: "Content verwijderd: {filename}"

components:
  seo:
    type: object
    label: SEO en zoekmachines
    fields:
      - name: meta_title
        label: Paginatitel voor Google
        type: string
        required: true
        options:
          maxlength: 65
      - name: meta_description
        label: Beschrijving voor Google
        type: text
        required: true
        options:
          maxlength: 170
  page_hero:
    type: object
    label: Bovenste paginablok
    fields:
      - name: eyebrow
        label: Kleine boventitel
        type: string
      - name: title
        label: Grote titel
        type: string
        required: true
      - name: intro
        label: Inleidende tekst
        type: text
        required: true
      - name: hero_image
        label: Grote afbeelding
        type: image
        required: true
        options:
          media: images
      - name: hero_image_alt
        label: Beschrijving van de afbeelding
        type: string
        required: true
        description: Beschrijf kort wat op de foto staat. Dit is belangrijk voor toegankelijkheid en Google.

