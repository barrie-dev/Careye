  - name: managed_content
    label: Projecten, diensten en vacatures
    type: group
    items:
      - name: projects
        label: Projecten
        type: collection
        path: content/projects
        format: json
        filename: "{order}-{title}.json"
        view:
          fields: [title, category_label, published, spotlight, order]
          primary: title
          sort: [order, title, category_label]
          search: [title, category_label]
          default:
            sort: order
            order: asc
        fields:
          - name: title
            label: Projecttitel
            type: string
            required: true
          - name: order
            label: Volgorde
            type: number
            required: true
            options:
              min: 1
          - name: published
            label: Zichtbaar op de website
            type: boolean
            default: true
          - name: category
            label: Technische categorie
            type: select
            required: true
            options:
              values:
                - name: industrie
                  label: Industrie
                - name: agro
                  label: Agro
                - name: buiten
                  label: Buiten
                - name: constructie
                  label: Constructie
          - name: category_label
            label: Categorie zoals bezoekers ze zien
            type: string
            required: true
          - name: image
            label: Projectfoto
            type: image
            required: true
            options:
              media: images
          - name: image_alt
            label: Beschrijving van de foto
            type: string
            required: true
          - name: fallback
            label: Technische reserveafbeelding
            type: string
            hidden: true
          - name: spotlight
            label: Toon als groot spotlightproject op de homepage
            type: boolean
            default: false
          - name: spotlight_heading
            label: Grote titel in de spotlight
            type: string
          - name: spotlight_text
            label: Tekst in de spotlight
            type: text
          - name: application
            label: Toepassing
            type: string
          - name: finish
            label: Afwerking
            type: string
          - name: execution
            label: Uitvoering
            type: string

      - name: services
        label: Diensten
        type: collection
        path: content/services
        format: json
        filename: "{order}-{title}.json"
        view:
          fields: [title, published, show_on_home, order]
          primary: title
          sort: [order, title]
          search: [title]
          default:
            sort: order
            order: asc
        fields:
          - name: title
            label: Volledige titel
            type: string
            required: true
          - name: slug
            label: Technische linknaam
            type: string
            required: true
            pattern:
              regex: "^[a-z0-9-]+$"
              message: Gebruik alleen kleine letters, cijfers en koppeltekens.
          - name: order
            label: Volgorde
            type: number
            required: true
            options:
              min: 1
          - name: published
            label: Zichtbaar op de dienstenpagina
            type: boolean
            default: true
          - name: show_on_home
            label: Toon op de homepage
            type: boolean
            default: true
          - name: short_title
            label: Korte titel op de homepage
            type: string
          - name: short_text
            label: Korte tekst op de homepage
            type: text
          - name: index_label
            label: Kleine categorienaam op de dienstenpagina
            type: string
          - name: description_1
            label: Eerste alinea
            type: text
          - name: description_2
            label: Tweede alinea
            type: text
          - name: image
            label: Afbeelding
            type: image
            required: true
            options:
              media: images
          - name: image_alt
            label: Beschrijving van de afbeelding
            type: string
          - name: fallback
            label: Technische reserveafbeelding
            type: string
            hidden: true
          - name: features
            label: Kenmerken
            type: string
            list: true
          - name: button_label
            label: Tekst op de contactknop
            type: string

      - name: jobs
        label: Vacatures
        type: collection
        path: content/jobs
        format: json
        filename: "{order}-{slug}.json"
        view:
          fields: [title, category, location, published, order]
          primary: title
          sort: [order, title]
          search: [title, category, location]
          default:
            sort: order
            order: asc
        fields:
          - name: title
            label: Functietitel
            type: string
            required: true
          - name: slug
            label: Linknaam
            type: string
            required: true
            pattern:
              regex: "^[a-z0-9-]+$"
              message: Gebruik alleen kleine letters, cijfers en koppeltekens.
          - name: order
            label: Volgorde
            type: number
            required: true
            options:
              min: 1
          - name: published
            label: Vacature staat open
            type: boolean
            default: true
          - name: category
            label: Korte functiegroep
            type: string
            required: true
          - name: location
