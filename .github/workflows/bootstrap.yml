name: Pak Careye website uit

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/**'
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Projectpakket uitpakken
        shell: bash
        run: |
          set -euo pipefail
          test -d .bootstrap || exit 0
          cat .bootstrap/part-* | tr -d '\n\r ' | base64 --decode > /tmp/careye-project.tar.gz
          mkdir -p /tmp/careye-project
          tar -xzf /tmp/careye-project.tar.gz -C /tmp/careye-project

          shopt -s dotglob nullglob
          entries=(/tmp/careye-project/*)
          source_dir=/tmp/careye-project
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            source_dir="${entries[0]}"
          fi

          find . -mindepth 1 -maxdepth 1 \
            ! -name .git \
            ! -name .github \
            ! -name .bootstrap \
            -exec rm -rf {} +

          cp -a "$source_dir"/. ./
          rm -rf .bootstrap

      - name: Wijzigingen vastleggen
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om vast te leggen."
            exit 0
          fi
          git commit -m "Publiceer volledige Careye CMS-website"
          git push origin main
