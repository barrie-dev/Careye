name: Publiceer Careye website

on:
  push:
    branches: [main]
    paths:
      - '.bootstrap/**'
      - '.github/workflows/bootstrap.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Projectpakket controleren
        shell: bash
        run: |
          set -euo pipefail
          echo "Beschikbare pakketdelen:"
          find .bootstrap -maxdepth 1 -type f -name 'part-*' -printf '%f %s bytes\n' | sort
          mapfile -t parts < <(find .bootstrap -maxdepth 1 -type f -name 'part-*' -print | sort -V)
          if [ "${#parts[@]}" -eq 0 ]; then
            echo "Geen pakketdelen gevonden."
            exit 1
          fi
          cat "${parts[@]}" | tr -d '\n\r ' | base64 --decode > /tmp/careye-project.tar.gz
          echo "Archiefgrootte: $(stat -c%s /tmp/careye-project.tar.gz) bytes"
          gzip -t /tmp/careye-project.tar.gz
          tar -tzf /tmp/careye-project.tar.gz > /tmp/careye-files.txt
          echo "Aantal bestanden in archief: $(wc -l < /tmp/careye-files.txt)"
          head -20 /tmp/careye-files.txt

      - name: Projectpakket uitpakken
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/careye-project
          mkdir -p /tmp/careye-project
          tar -xzf /tmp/careye-project.tar.gz -C /tmp/careye-project
          shopt -s dotglob nullglob
          entries=(/tmp/careye-project/*)
          source_dir=/tmp/careye-project
          if [ "${#entries[@]}" -eq 1 ] && [ -d "${entries[0]}" ]; then
            source_dir="${entries[0]}"
          fi
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github ! -name .bootstrap -exec rm -rf {} +
          cp -a "$source_dir"/. ./
          rm -rf .bootstrap

      - name: Wijzigingen vastleggen
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om vast te leggen."
            exit 0
          fi
          git commit -m "Publiceer vernieuwde Careye website"
          git push origin main
